# Mirror Echada Pipeline Models to CDN
#
# Mirrors the three Qwen3-TTS models required by the echada voice pipeline
# to the Acervo CDN (Cloudflare R2) using the reusable mirror_model workflow
# from SwiftAcervo. Each run downloads fresh from HuggingFace, recomputes
# SHA-256 checksums, and publishes an updated manifest.json.
#
# Required org secrets (set in GitHub → Settings → Secrets):
#   R2_ACCESS_KEY_ID       Cloudflare R2 access key
#   R2_SECRET_ACCESS_KEY   Cloudflare R2 secret key
#   R2_ENDPOINT            R2 endpoint URL
#   R2_BUCKET              R2 bucket name
#   HF_TOKEN               HuggingFace read token (for gated repos)
#
# Triggers:
#   workflow_dispatch  — manual re-mirror (e.g. after upstream model update)
#   schedule           — monthly check on the 1st at 03:00 UTC

name: Mirror Pipeline Models to CDN

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Which model to mirror (all | voice-design | base-1.7b | base-0.6b)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - voice-design
          - base-1.7b
          - base-0.6b
  schedule:
    - cron: "0 3 1 * *"  # 03:00 UTC on the 1st of each month

jobs:
  # Phase A model: voice candidate generation
  mirror-voice-design:
    name: Mirror VoiceDesign 1.7B
    if: ${{ github.event_name == 'schedule' || inputs.model == 'all' || inputs.model == 'voice-design' }}
    uses: intrusive-memory/SwiftAcervo/.github/workflows/mirror_model.yml@main
    with:
      model_id: mlx-community/Qwen3-TTS-12Hz-1.7B-VoiceDesign-bf16
    secrets: inherit

  # Phase B model: default voice locking (1.7B)
  mirror-base-1-7b:
    name: Mirror Base 1.7B
    if: ${{ github.event_name == 'schedule' || inputs.model == 'all' || inputs.model == 'base-1.7b' }}
    uses: intrusive-memory/SwiftAcervo/.github/workflows/mirror_model.yml@main
    with:
      model_id: mlx-community/Qwen3-TTS-12Hz-1.7B-Base-bf16
    secrets: inherit

  # Phase B model: lightweight alternative (0.6B)
  mirror-base-0-6b:
    name: Mirror Base 0.6B
    if: ${{ github.event_name == 'schedule' || inputs.model == 'all' || inputs.model == 'base-0.6b' }}
    uses: intrusive-memory/SwiftAcervo/.github/workflows/mirror_model.yml@main
    with:
      model_id: mlx-community/Qwen3-TTS-12Hz-0.6B-Base-bf16
    secrets: inherit
